<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAST SEED — Matriz de Sistemas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1a13;
    --surface: #111f17;
    --surface2: #162b1e;
    --border: #1f3d2b;
    --accent: #3d9e6a;
    --accent2: #5ec48a;
    --text: #e8f5ee;
    --text2: #a8ceb8;
    --text3: #5a8a6a;
    --font: 'DM Sans', sans-serif;
    --serif: 'DM Serif Display', serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 1.25rem 2rem; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 1rem; }
  header h1 { font-family: var(--serif); font-size: 1.5rem; color: var(--accent2); font-weight: 400; letter-spacing: 0.04em; }
  header span { font-size: 0.75rem; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; }
  .main-layout { display: flex; flex: 1; overflow: hidden; }
  .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; background: radial-gradient(circle at 50% 50%, #1a3325 0%, #0d1a13 70%); }
  canvas { display: block; cursor: default; }
  .side-panel { width: 330px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
  .panel-header { padding: 1.5rem; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .panel-header .badge { display: inline-block; font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; margin-bottom: 0.75rem; }
  .panel-header h2 { font-family: var(--serif); font-size: 1.2rem; font-weight: 400; color: var(--accent2); line-height: 1.35; }
  .panel-header .sub { font-size: 0.72rem; color: var(--text3); margin-top: 6px; letter-spacing: 0.06em; text-transform: uppercase; }
  .panel-body { padding: 1.5rem; flex: 1; }
  .panel-body p { font-size: 0.875rem; line-height: 1.8; color: var(--text2); }
  .panel-empty { padding: 2.5rem 1.5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; gap: 1rem; }
  .panel-empty .seed-icon { width: 48px; height: 48px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
  .panel-empty p { font-size: 0.82rem; color: var(--text3); line-height: 1.65; }
  .legend { padding: 1rem 1.5rem 1.25rem; border-top: 1px solid var(--border); }
  .legend-title { font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3); margin-bottom: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text2); padding: 4px 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  @media (max-width: 820px) {
    .main-layout { flex-direction: column; }
    .side-panel { width: 100%; min-height: 240px; border-left: none; border-top: 1px solid var(--border); }
    .canvas-area { padding: 1rem; }
  }
</style>
</head>
<body>
<header>
  <h1>LAST SEED</h1>
  <span>Matriz de sistemas · 6 dimensiones · 4 escalas</span>
</header>
<div class="main-layout">
  <div class="canvas-area">
    <canvas id="matrix" width="520" height="520"></canvas>
  </div>
  <aside class="side-panel">
    <div class="panel-empty" id="emptyState">
      <div class="seed-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3d9e6a" stroke-width="1.5"><ellipse cx="12" cy="12" rx="4" ry="7" transform="rotate(-20 12 12)"/><path d="M12 12 C8 8 5 4 7 2" stroke-dasharray="2 2"/></svg>
      </div>
      <p>Selecciona una celda del diagrama para explorar cómo cada dimensión se expresa en cada escala.</p>
      <p style="font-size:0.72rem;opacity:0.5;">6 dimensiones × 4 escalas = 24 perspectivas</p>
    </div>
    <div id="panelContent" style="display:none;flex-direction:column;flex:1;">
      <div class="panel-header">
        <div class="badge" id="panelBadge"></div>
        <h2 id="panelTitle"></h2>
        <div class="sub" id="panelSub"></div>
      </div>
      <div class="panel-body"><p id="panelText"></p></div>
    </div>
    <div class="legend">
      <div class="legend-title">Escalas</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2a5c3e;border:1px solid #3d9e6a;"></div>Individuo</div>
      <div class="legend-item"><div class="legend-dot" style="background:#1f4a32;border:1px solid #2e8056;"></div>Tribu</div>
      <div class="legend-item"><div class="legend-dot" style="background:#163620;border:1px solid #1f6040;"></div>Región</div>
      <div class="legend-item"><div class="legend-dot" style="background:#0f2418;border:1px solid #154830;"></div>Mundo</div>
    </div>
  </aside>
</div>
<script>
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
const cx = 260, cy = 260;
const AXES   = ['Naturaleza','Gobierno','Economía','Infraestructura','Cultura','Recursos'];
const LAYERS = ['Individuo','Tribu','Región','Mundo'];
const radii  = [0, 62, 118, 178, 248];
const axisCount = 6;
const sectorAngle = (2 * Math.PI) / axisCount;
const baseAngle = -Math.PI / 2;
const ringColors = ['#2a5c3e','#1f4a32','#163620','#0f2418'];
const ringHover  = ['#3a7a52','#2a6040','#1e4a2c','#163320'];
const ringActive = ['#4a9a68','#3a7a52','#2a5c3e','#1f4a32'];
const ringStrokes= ['#3d9e6a','#2e8056','#1f6040','#154830'];
const badgeBg    = ['#1a4a2e','#153c24','#0f2c1a','#0a1e10'];
const badgeTxt   = ['#5ec48a','#4aaa74','#3a8a5e','#2a6a48'];

const CONTENT = {
  'Naturaleza': {
    'Individuo': { title: 'Naturaleza · Individuo', text: 'Ren tiene una conexión directa con la naturaleza porque su supervivencia depende de ella. Su cuerpo, sus sentidos y sus decisiones están marcados por el contacto con el entorno natural y por la búsqueda de vida en un mundo deteriorado.' },
    'Tribu':     { title: 'Naturaleza · Tribu',     text: 'La relación de Ren con la naturaleza también afecta a quienes lo rodean. Sus acciones pueden inspirar a otros personajes a proteger, recuperar o comprender el valor de los sistemas vivos.' },
    'Región':    { title: 'Naturaleza · Región',    text: 'El viaje de Ren evidencia cómo el territorio ha sido transformado por la pérdida ambiental. Cada espacio recorrido muestra las consecuencias del deterioro de la naturaleza sobre comunidades, paisajes y formas de vida.' },
    'Mundo':     { title: 'Naturaleza · Mundo',     text: 'La historia de Ren representa un conflicto global: la posibilidad de que la vida natural desaparezca si no se protege la última semilla. La naturaleza se convierte en el centro simbólico de la esperanza.' },
  },
  'Gobierno': {
    'Individuo': { title: 'Gobierno · Individuo', text: 'Ren se enfrenta a estructuras de poder que condicionan su libertad y sus decisiones. Su camino muestra cómo un individuo puede resistir frente a sistemas que intentan controlar el futuro.' },
    'Tribu':     { title: 'Gobierno · Tribu',     text: 'Las relaciones de poder también afectan a los grupos cercanos de Ren. La confianza, la obediencia, la resistencia y la protección colectiva se vuelven claves dentro de la historia.' },
    'Región':    { title: 'Gobierno · Región',    text: 'En el territorio que habita Ren, el gobierno o las fuerzas dominantes regulan el acceso a recursos, desplazamientos y zonas de supervivencia. El poder define quién puede vivir y bajo qué condiciones.' },
    'Mundo':     { title: 'Gobierno · Mundo',     text: 'A escala global, LAST SEED plantea un mundo donde las decisiones políticas y de control han contribuido al colapso. El gobierno representa la tensión entre dominación, orden y supervivencia.' },
  },
  'Economía': {
    'Individuo': { title: 'Economía · Individuo', text: 'Ren vive en un contexto donde los recursos tienen valor extremo. Sus decisiones están atravesadas por la escasez, el intercambio y la necesidad de sobrevivir con lo mínimo.' },
    'Tribu':     { title: 'Economía · Tribu',     text: 'Dentro de los grupos cercanos, la economía aparece como una forma de dependencia y cooperación. Compartir, proteger o disputar recursos define las relaciones entre los personajes.' },
    'Región':    { title: 'Economía · Región',    text: 'La región muestra una economía fragmentada, basada en la escasez, el control de bienes esenciales y la desigualdad en el acceso a recursos vitales.' },
    'Mundo':     { title: 'Economía · Mundo',     text: 'A nivel mundial, la historia sugiere que un modelo económico extractivo pudo llevar al deterioro del planeta. La última semilla funciona como símbolo de un valor que ya no puede medirse solo en dinero.' },
  },
  'Infraestructura': {
    'Individuo': { title: 'Infraestructura · Individuo', text: 'Ren interactúa con espacios deteriorados, ruinas, caminos y sistemas que ya no funcionan como antes. La infraestructura condiciona su movilidad, su seguridad y su capacidad de avanzar.' },
    'Tribu':     { title: 'Infraestructura · Tribu',     text: 'Los refugios, rutas y espacios compartidos permiten que los grupos sobrevivan. La infraestructura se convierte en un recurso estratégico para protegerse y organizarse.' },
    'Región':    { title: 'Infraestructura · Región',    text: 'La región evidencia el colapso de sistemas físicos: transporte, energía, vivienda, agua o comunicación. Estos elementos muestran visualmente el estado del mundo de LAST SEED.' },
    'Mundo':     { title: 'Infraestructura · Mundo',     text: 'A escala global, la infraestructura representa una civilización en ruinas. Lo que antes sostenía el progreso ahora funciona como evidencia del fracaso humano frente al planeta.' },
  },
  'Cultura': {
    'Individuo': { title: 'Cultura · Individuo', text: 'Ren carga una visión particular del mundo marcada por la pérdida, la memoria y la esperanza. Su identidad se construye a partir de lo que recuerda, lo que protege y lo que decide creer.' },
    'Tribu':     { title: 'Cultura · Tribu',     text: 'La cultura aparece en los vínculos, rituales, relatos y formas de organización de los grupos. Cada tribu o comunidad puede tener una manera distinta de entender la semilla y el futuro.' },
    'Región':    { title: 'Cultura · Región',    text: 'En la región, las creencias colectivas determinan cómo las personas interpretan la crisis. Algunas comunidades pueden ver la semilla como salvación, amenaza, mito o recurso de poder.' },
    'Mundo':     { title: 'Cultura · Mundo',     text: 'LAST SEED plantea una reflexión cultural sobre la relación de la humanidad con la vida. La historia cuestiona los valores que llevaron al colapso y propone la posibilidad de una nueva conciencia.' },
  },
  'Recursos': {
    'Individuo': { title: 'Recursos · Individuo', text: 'Ren depende de recursos limitados para sobrevivir: agua, alimento, refugio y protección. Cada recurso tiene un peso narrativo porque puede significar vida o muerte.' },
    'Tribu':     { title: 'Recursos · Tribu',     text: 'Los recursos determinan la cooperación o el conflicto entre personajes. Compartirlos fortalece los vínculos, mientras que disputarlos revela miedo, poder y necesidad.' },
    'Región':    { title: 'Recursos · Región',    text: 'En la región, los recursos están distribuidos de forma desigual o están casi agotados. Esto genera desplazamientos, tensiones y zonas de control.' },
    'Mundo':     { title: 'Recursos · Mundo',     text: 'A escala global, la escasez de recursos es una de las causas centrales del universo de LAST SEED. La última semilla representa el recurso más importante: la posibilidad de regenerar la vida.' },
  },
};

function cellKey(a,l){ return a+'__'+l; }

const cells = [];
for(let s=0;s<axisCount;s++){
  const a1 = baseAngle + s*sectorAngle;
  const a2 = a1 + sectorAngle;
  for(let r=0;r<4;r++){
    cells.push({s,r,a1,a2,ri:radii[r],ro:radii[r+1],key:cellKey(AXES[s],LAYERS[r])});
  }
}

let hoverCell=null, activeCell=null;

function drawMatrix(hKey,aKey){
  ctx.clearRect(0,0,520,520);
  ctx.beginPath(); ctx.arc(cx,cy,radii[4]+3,0,Math.PI*2);
  ctx.fillStyle='#111f17'; ctx.fill();

  cells.forEach(({s,r,a1,a2,ri,ro,key})=>{
    const isA=key===aKey, isH=key===hKey&&!isA;
    ctx.beginPath();
    ctx.arc(cx,cy,ro,a1,a2);
    ctx.arc(cx,cy,ri,a2,a1,true);
    ctx.closePath();
    ctx.fillStyle = isA?ringActive[r]:isH?ringHover[r]:ringColors[r];
    ctx.fill();
    ctx.strokeStyle = isA?ringStrokes[r]:ringStrokes[r]+'55';
    ctx.lineWidth = isA?1.5:0.8;
    ctx.stroke();
  });

  ctx.beginPath(); ctx.arc(cx,cy,8,0,Math.PI*2); ctx.fillStyle='#3d9e6a'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.fillStyle='#0d1a13'; ctx.fill();

  for(let s=0;s<axisCount;s++){
    const mid = baseAngle + s*sectorAngle + sectorAngle/2;
    const lr = radii[4]+24;
    const lx = cx+Math.cos(mid)*lr, ly = cy+Math.sin(mid)*lr;
    ctx.save(); ctx.translate(lx,ly);
    let rot=mid; if(rot>Math.PI/2&&rot<Math.PI*3/2) rot+=Math.PI;
    ctx.rotate(rot);
    ctx.font='600 10px "DM Sans",sans-serif';
    ctx.fillStyle='#5ec48a'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(AXES[s].toUpperCase(),0,0);
    ctx.restore();
  }

  const laSector = baseAngle + 0.5*sectorAngle;
  const laMid = [radii[0]/2+radii[1]/2,(radii[1]+radii[2])/2,(radii[2]+radii[3])/2,(radii[3]+radii[4])/2];
  LAYERS.forEach((lbl,i)=>{
    const lx=cx+Math.cos(laSector)*laMid[i], ly=cy+Math.sin(laSector)*laMid[i];
    ctx.font='500 8.5px "DM Sans",sans-serif';
    ctx.fillStyle=i<2?'#5ec48acc':'#3d9e6acc';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(lbl.toUpperCase(),lx,ly);
  });
}

function getHit(mx,my){
  const dx=mx-cx,dy=my-cy,d=Math.sqrt(dx*dx+dy*dy);
  if(d<5||d>radii[4]) return null;
  let a=Math.atan2(dy,dx)-baseAngle; if(a<0)a+=2*Math.PI;
  const si=Math.floor(a/sectorAngle)%axisCount;
  let ri=-1;
  for(let i=0;i<4;i++) if(d>=radii[i]&&d<radii[i+1]){ri=i;break;}
  if(ri===-1) return null;
  return {axis:AXES[si],layer:LAYERS[ri],layerIdx:ri,key:cellKey(AXES[si],LAYERS[ri])};
}

function showPanel(axis,layer,li){
  const d=CONTENT[axis]?.[layer]; if(!d) return;
  document.getElementById('emptyState').style.display='none';
  const pc=document.getElementById('panelContent'); pc.style.display='flex';
  const b=document.getElementById('panelBadge');
  b.textContent=layer; b.style.background=badgeBg[li]; b.style.color=badgeTxt[li];
  b.style.border='1px solid '+ringStrokes[li]+'88';
  document.getElementById('panelTitle').textContent=d.title;
  document.getElementById('panelSub').textContent=axis+' · '+layer;
  document.getElementById('panelText').textContent=d.text;
}

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(520/r.width), my=(e.clientY-r.top)*(520/r.height);
  const hit=getHit(mx,my);
  const hKey=hit?hit.key:null, aKey=activeCell?.key??null;
  canvas.style.cursor=hit?'pointer':'default';
  if(hKey!==(hoverCell?.key??null)){ hoverCell=hit; drawMatrix(hKey,aKey); }
});

canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(520/r.width), my=(e.clientY-r.top)*(520/r.height);
  const hit=getHit(mx,my);
  if(hit){ activeCell=hit; drawMatrix(hit.key,hit.key); showPanel(hit.axis,hit.layer,hit.layerIdx); }
});

canvas.addEventListener('mouseleave',()=>{ hoverCell=null; drawMatrix(null,activeCell?.key??null); });
drawMatrix(null,null);
</script>
</body>
</html>
